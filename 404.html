<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: #fafafa;
            color: #333;
        }
        .content {
            flex: 1;
            padding: 20px;
            text-align: center;
        }
        .sidebar {
            width: 200px;
            background: #f4f4f4;
            padding: 10px;
            border-right: 1px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .sidebar img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <img id="randomImage" src="" alt="Random 404 Image">
    </div>
    <div class="content">
        <h1>404 - Page Not Found</h1>
        <p>Sorry, the page you are looking for does not exist.</p>
    </div>

    <script>
        const images = [
            'https://raw.githubusercontent.com/bettergif/bettergif.qzz.io/main/404images/image1.jpg',
            'https://raw.githubusercontent.com/bettergif/bettergif.qzz.io/main/404images/image2.jpg',
            'https://raw.githubusercontent.com/bettergif/bettergif.qzz.io/main/404images/image3.jpg',
            // Add more image URLs here
        ];

        const randomImage = images[Math.floor(Math.random() * images.length)];
        document.getElementById('randomImage').src = randomImage;
    </script>
</body>
</html>
